# ─── Fly.io app config for the NostosEMR demo deployment ───────────────────
# Single web process for the demo. No queue worker, no scheduler, no Reverb :
#  - The "Recompute now" buttons on the derived dashboards run inline so we
#    don't need a queue worker for that flow.
#  - Nightly QualityMeasureSnapshot / CareGapCalculation / PredictiveRiskScoring
#    jobs aren't required for demos — manual recompute covers it.
#  - Reverb (websocket) is chat-only ; chat falls back gracefully without it.
# When we sign a real client we'll add `[processes]` entries for worker +
# scheduler, which means scaling from 1 VM to 3 (~$5/mo extra each).
#
# After the initial `fly launch` writes app id / region, we layer config on
# top of this. To re-apply : `fly deploy --config fly.toml`.
# ─────────────────────────────────────────────────────────────────────────────

app = "nostos-emr-vue"

# Closest region to TJ for now. Change later if PACE contacts are East-coast.
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

# ── Release command : runs ONCE per deploy, before the new VMs go live. ─────
# Migrations always ; demo seed only if the DB is empty (first-deploy bootstrap).
# Fly gives the release_command machine ~30 min vs SSH's ~3 min timeout,
# which is why this is the right place for the multi-minute demo seeder.
# The participant-count guard makes re-deploys idempotent : we don't
# re-seed every time, only on a fresh / wiped DB.
[deploy]
  release_command = "sh -c 'php artisan migrate --force && php artisan demo:seed-if-empty'"

# ── HTTP service ────────────────────────────────────────────────────────────
# Public-facing port 80 / 443 → internal port 8080 (serversideup default).
# Fly handles Let's Encrypt automatically once a custom domain is added.
[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"     # Free-tier-friendly : park when idle.
  auto_start_machines = true      # Wake on first request (~1-3s cold start).
  min_machines_running = 0        # Truly $0 when no one is hitting the app.
  processes = ["app"]

# Health check : Laravel ships /up out of the box (bootstrap/app.php).
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/up"

# ── VM sizing ───────────────────────────────────────────────────────────────
# 1 GB RAM is comfortable for a Laravel app running migrations + Inertia
# rendering. Drop to 512 MB if cost matters — Laravel boots fine in 256 MB
# but composer/migration steps occasionally OOM at that size.
[[vm]]
  size = "shared-cpu-1x"
  # 1 GB is plenty for demo runtime traffic. Bump to 2 GB ONLY for the
  # initial demo seed (DemoEnvironmentSeeder OOMs at 1 GB) by editing
  # this file before `fly deploy` then dropping it back. The seeder runs
  # in a separate release_command machine, but that machine inherits
  # this VM size — see release_command in [deploy] below.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
