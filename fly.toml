# fly.toml app configuration file generated for app-little-fire-1390 on 2026-04-30T15:50:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'app-little-fire-1390'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'php artisan migrate --force'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/up'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
